name: Ask Magic Mike Release Gate

on:
  pull_request:
  push:
    branches:
      - platform/phase-2-release-hardening
      - main
  workflow_dispatch:

jobs:
  local-release-gate:
    name: local-release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Release doctor
        run: npm run release:doctor

      - name: Release safety scan
        run: npm run release:safety

      - name: Unit tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Release candidate report
        run: npm run release:report

      - name: Launch authority report
        run: npm run launch:authority

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts
          path: |
            artifacts/*.json
            artifacts/*.md
          if-no-files-found: ignore
